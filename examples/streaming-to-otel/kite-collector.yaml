# kite-collector configuration
# Generated by: kite-collector init

discovery:
  sources:
    agent:
      enabled: true
      collect_software: true
    clickhouse:
      enabled: true
      endpoint: http://127.0.0.1:8123
    docker:
      enabled: true
      endpoint: /var/run/docker.sock
    otel_collector:
      enabled: true
      endpoint: http://127.0.0.1:4318

audit:
  enabled: true

stale_threshold: 168h
