version: 2

builds:
  - id: kite-collector
    main: ./cmd/kite-collector
    binary: kite-collector
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

# Tarball for Homebrew (brews requires tar.gz, not raw binaries).
archives:
  - id: homebrew
    formats: [tar.gz]
    name_template: "kite-collector_{{ .Os }}_{{ .Arch }}"
  # Flat binary distribution — single file download, no tar.gz.
  - id: flat
    formats: [binary]
    name_template: "kite-collector_{{ .Os }}_{{ .Arch }}_bin"

checksum:
  name_template: "checksums.txt"

# Linux packages via nfpm.
nfpms:
  - id: packages
    package_name: kite-collector
    vendor: VulnerTrack
    homepage: https://github.com/VulnerTrack/kite-collector
    maintainer: VulnerTrack <hello@vulnertrack.dev>
    description: Cybersecurity asset discovery, configuration audit, and posture analysis agent.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin
    contents:
      - src: configs/kite-collector.example.yaml
        dst: /etc/kite-collector/kite-collector.example.yaml
        type: config

# Homebrew tap — GoReleaser auto-generates the formula and pushes it
# to the tap repo on every v* release.
brews:
  - name: kite-collector
    ids: [homebrew]
    repository:
      owner: VulnerTrack
      name: homebrew-tap
    homepage: https://github.com/VulnerTrack/kite-collector
    description: "Cybersecurity asset discovery, configuration audit, and posture analysis agent"
    license: MIT
    install: |
      bin.install "kite-collector"
    test: |
      system "#{bin}/kite-collector", "version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
