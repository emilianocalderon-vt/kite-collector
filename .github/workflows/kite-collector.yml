# CI/CD Pipeline for kite-collector — RFC-0051
# Runs on every push/PR to main. Release on v* tags.
name: Kite Collector

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

concurrency:
  group: kite-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"
  CGO_ENABLED: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────
  # Phase 1: Quality Gates (parallel)
  # ──────────────────────────────────────────────

  vet:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go vet ./...

  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - run: golangci-lint run --timeout=5m ./...

  security:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - run: gosec ./...

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: go test -count=1 -coverprofile=coverage.out ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.out
          retention-days: 30

  tidy:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Check go mod tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' and commit."
            exit 1
          fi

  # ──────────────────────────────────────────────
  # Phase 2: Build (after all gates pass)
  # ──────────────────────────────────────────────

  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [vet, lint, security, test]
    if: "!startsWith(github.ref, 'refs/tags/v')"
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -ldflags="-s -w \
            -X main.version=${{ github.ref_name }} \
            -X main.commit=${{ github.sha }} \
            -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          -o kite-collector-${{ matrix.goos }}-${{ matrix.goarch }} \
          ./cmd/kite-collector
      - uses: actions/upload-artifact@v4
        with:
          name: kite-collector-${{ matrix.goos }}-${{ matrix.goarch }}
          path: kite-collector-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 30

  # ──────────────────────────────────────────────
  # Phase 3: Release (v* tags only)
  # ──────────────────────────────────────────────

  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [vet, lint, security, test]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: kite-collector-sbom.spdx.json
          path: .
